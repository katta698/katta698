<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Jayanth Katta — AWS Platform Engineer</title>
  <desc id="desc">Forest-charcoal profile banner with warm gold editorial accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161A1A"/>
      <stop offset="1" stop-color="#1D2322"/>
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="14%" r="72%">
      <stop offset="0" stop-color="#C4A484" stop-opacity=".17"/>
      <stop offset="1" stop-color="#C4A484" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#F5F5F3" stroke-opacity=".035"/>
    </pattern>
  </defs>

  <rect x="1" y="1" width="1198" height="358" rx="22" fill="url(#bg)" stroke="#2E3635" stroke-width="2"/>
  <rect x="1" y="1" width="1198" height="358" rx="22" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="358" rx="22" fill="url(#glow)"/>

  <g font-family="'Courier New', monospace">
    <text x="62" y="64" fill="#C4A484" font-size="17">jayanth@cloud:~$</text>
    <text x="248" y="64" fill="#A3ABA9" font-size="17">whoami</text>
  </g>

  <text x="60" y="139" fill="#F5F5F3" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700">Jayanth Katta</text>
  <text x="60" y="188" fill="#C4A484" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-style="italic">AWS Platform Engineer</text>
  <text x="62" y="230" fill="#A3ABA9" font-family="Arial, sans-serif" font-size="19">Cloud infrastructure · Terraform · GitOps · Platform engineering</text>

  <g transform="translate(62 269)" font-family="'Courier New', monospace" font-size="14">
    <g>
      <rect width="92" height="34" rx="5" fill="#242B2A" stroke="#3A4542"/>
      <text x="46" y="22" text-anchor="middle" fill="#D7DAD7">AWS</text>
    </g>
    <g transform="translate(104)">
      <rect width="122" height="34" rx="5" fill="#242B2A" stroke="#3A4542"/>
      <text x="61" y="22" text-anchor="middle" fill="#D7DAD7">Terraform</text>
    </g>
    <g transform="translate(238)">
      <rect width="92" height="34" rx="5" fill="#242B2A" stroke="#3A4542"/>
      <text x="46" y="22" text-anchor="middle" fill="#D7DAD7">GitOps</text>
    </g>
    <g transform="translate(342)">
      <rect width="142" height="34" rx="5" fill="#242B2A" stroke="#3A4542"/>
      <text x="71" y="22" text-anchor="middle" fill="#D7DAD7">EKS / Kubernetes</text>
    </g>
  </g>

  <g transform="translate(810 88)">
    <rect width="320" height="190" rx="14" fill="#161A1A" fill-opacity=".74" stroke="#3A4542"/>
    <path d="M0 70H320M0 130H320" stroke="#2E3635"/>
    <text x="25" y="43" fill="#C4A484" font-family="Georgia, serif" font-size="30" font-weight="700">14+</text>
    <text x="104" y="40" fill="#A3ABA9" font-family="'Courier New', monospace" font-size="13">YEARS IN</text>
    <text x="104" y="57" fill="#A3ABA9" font-family="'Courier New', monospace" font-size="13">INFRASTRUCTURE</text>
    <text x="25" y="111" fill="#C4A484" font-family="Georgia, serif" font-size="27" font-weight="700">IaC</text>
    <text x="104" y="100" fill="#A3ABA9" font-family="'Courier New', monospace" font-size="13">TERRAFORM-FIRST</text>
    <text x="104" y="117" fill="#A3ABA9" font-family="'Courier New', monospace" font-size="13">APPROACH</text>
    <text x="25" y="174" fill="#C4A484" font-family="Georgia, serif" font-size="30" font-weight="700">∞</text>
    <text x="104" y="163" fill="#A3ABA9" font-family="'Courier New', monospace" font-size="13">STILL LEARNING</text>
    <text x="104" y="180" fill="#A3ABA9" font-family="'Courier New', monospace" font-size="13">ALWAYS SHIPPING</text>
  </g>

  <circle cx="1158" cy="322" r="4" fill="#C4A484"/>
  <path d="M1120 322h25" stroke="#C4A484" stroke-width="2"/>
