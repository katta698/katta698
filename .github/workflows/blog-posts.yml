name: Update Blog Posts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"   # daily at 8am UTC

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update BLOG-POST-LIST from RSS
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://jayanthkatta.com/blog/rss.xml"
          max_post_count: 5
          date_format: "mmm yyyy"
          template: '- $title — $date <a href="$url"><img src="assets/link-read.svg" height="22" alt="Read post" /></a>$newline'
          tag_post_pre_newline: true
          commit_message: "chore: update latest blog posts"

      - name: Update Building row from latest weekly post
        run: |
          set -x
          RSS=$(curl -s https://jayanthkatta.com/blog/rss.xml)
          echo "RSS length: ${#RSS}"

          LATEST_WEEK=$(echo "$RSS" | grep -oP '<title><!\[CDATA\[Week \d+[^\]]*\]\]></title>' | head -1 | grep -oP 'Week \d+[^\]]*(?=\]\])')
          echo "LATEST_WEEK: '$LATEST_WEEK'"

          if [ -z "$LATEST_WEEK" ]; then
            echo "No weekly post found in RSS — skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git reset --hard origin/main

          LABEL="${LATEST_WEEK} - 52-week AWS Platform Engineering Lab"
          echo "Replacing Building row with: $LABEL"
          sed -i "s/| \*\*Building\*\* |.*|/| **Building** | ${LABEL} |/" README.md

          grep "Building" README.md

          git add README.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update current build to ${LATEST_WEEK}"
          git push
