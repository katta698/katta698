name: Update Blog Posts

on:
  workflow_dispatch:        # also runnable manually from the GitHub Actions tab
  schedule:
    - cron: "0 7 * * MON"   # every Monday 7am UTC — after the nightly blog sync

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://jayanthkatta.com/blog/rss.xml"
          max_post_count: 5
          date_format: "mmm yyyy"
          template: '- $title — $date <a href="$url"><img src="assets/link-read.svg" height="22" alt="Read post" /></a>$newline'
          tag_post_pre_newline: true
          commit_message: "Update latest blog posts in README"
