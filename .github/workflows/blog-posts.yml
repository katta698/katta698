name: Update Blog Posts

on:
  workflow_dispatch:   # manual only — run from GitHub Actions tab when you want to refresh

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.jayanthkatta.com/feeds/posts/default"
          max_post_count: 5
          date_format: "MMM YYYY"
          template: "- [$title]($url) — $date"
          commit_message: "Update latest blog posts in README"
